<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B16JAYS111 | About Me</title>
    <!-- Importing a clean, modern font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent-1: #4f46e5; /* Deep Indigo */
            --accent-2: #00f2fe; /* Bright Cyan */
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        /* Animated Dark Gradient Background */
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #0f172a, #020617);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-main);
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism Card Effect */
        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 50px 40px;
            max-width: 550px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: translateY(0);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6), 0 0 40px rgba(79, 70, 229, 0.2);
        }

        /* Glowing Spinning Avatar Border */
        .avatar-wrapper {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto 25px auto;
        }

        img.avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            position: relative;
            z-index: 2;
            border: 4px solid #0f172a;
        }

        .avatar-wrapper::before {
            content: '';
            position: absolute;
            top: -4px; left: -4px; right: -4px; bottom: -4px;
            background: linear-gradient(45deg, var(--accent-1), var(--accent-2), #ff007a);
            border-radius: 50%;
            z-index: 1;
            animation: spin 3s linear infinite;
        }

        @keyframes spin { 
            100% { transform: rotate(360deg); } 
        }

        /* Typography Styles */
        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin: 0 0 5px 0;
            line-height: 1.2;
        }

        .highlight {
            background: linear-gradient(to right, var(--accent-2), #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            font-size: 1.1rem;
            color: var(--accent-2);
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 25px;
        }

        p.bio {
            color: var(--text-muted);
            line-height: 1.7;
            font-size: 1rem;
            margin-bottom: 35px;
        }

        /* Modern Hover Buttons */
        .links {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            text-decoration: none;
            color: white;
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn.primary {
            background: linear-gradient(45deg, var(--accent-1), #6366f1);
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4);
        }

        .btn.primary:hover {
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.6);
            transform: scale(1.05);
        }

        .btn.secondary {
            background: transparent;
            color: var(--text-main);
            border: 2px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
        }

        .btn.secondary:hover {
            border-color: var(--accent-2);
            color: var(--accent-2);
            transform: scale(1.05);
            background: rgba(0, 242, 254, 0.05);
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- Avatar with Glowing Animation -->
        <div class="avatar-wrapper">
            <img src="https://via.placeholder.com/150" alt="Leon" class="avatar">
        </div>
        
        <!-- Gradient Text Header -->
        <h1>Hi, I'm <span class="highlight">B16JAYS111</span><br>AKA Leon 👋</h1>
        <p class="subtitle">Coder • MC Creator • Server Owner</p>
        
        <p class="bio">
            I mainly make games on my GitHub, or just build things I need. Have a look around if you'd like, stay as long as you need, and feel free to use any of my code—it's all open to the public!
        </p>
        
        <div class="links">
            <!-- Fixed the anchor tags and added target="_blank" so it opens in a new tab -->
            <a href="https://github.com/B16JAYS111" target="_blank" class="btn primary">
                🎮 View My Work
            </a>
            <a href="mailto:b16jays111@gmail.com" class="btn secondary">
                ✉️ Contact Me
            </a>
        </div>
    </div>

</body>
</html>
