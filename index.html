<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Me</title>
    <style>
        /* Modern Minimalist Styles */
        :root {
            --bg-color: #f8f9fa;
            --text-color: #212529;
            --accent-color: #4f46e5; /* Nice modern indigo */
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            padding: 40px 20px;
            text-align: center;
        }

        img.avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--accent-color);
        }

        h1 {
            font-size: 2.5rem;
            margin: 20px 0 10px 0;
        }

        p.subtitle {
            font-size: 1.2rem;
            color: #6c757d;
            margin-bottom: 30px;
        }

        .links {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            text-decoration: none;
            color: white;
            background-color: var(--accent-color);
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn.secondary {
            background-color: transparent;
            color: var(--accent-color);
            border: 2px solid var(--accent-color);
            padding: 8px 18px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Replace with your own image later -->
        <img src="https://via.placeholder.com/150" alt="Your Name" class="avatar">
        
        <h1>Hi, I'm B16JAYS111 AKA Leon 👋</h1>
        <p class="subtitle">A coder and a Minecraft Content Creator and server owner.</p>
        
        <p>Hi I mainly make games on my github, or just things I need. Have a look around if youd like, stay as long as you need and feel free to use any of my code! its all open to the public.</p>
        
        <div class="links">
            <a href="#" class="btn">View My Work</a>
            <a href="#" class="btn secondary">Contact Me</a>
        </div>
    </div>

</body>
</html>
